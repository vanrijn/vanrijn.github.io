lang: en-US
title: vanRijn / MovingParts
email:
description: Kinda like Batman, but with a wife and 3 kids
baseurl: # the optional subpath of your site, e.g. "/blog"
url: https://movingparts.net # the base hostname & protocol for your site e.g. "https://mmistakes.github.io"
author:
  name: Jason 'vanRijn' Kasper
  twitter: jdotk
  picture: /assets/me-playground-image-61-300x300.png
twitter_username: jdotk
github_username: vanrijn
logo: /assets/me-playground-image-61.png # path of site logo, e.g. "/assets/images/logo.png"
search: true # true, false (default)
search_full_content: false # true, false (default)
search_provider: # lunr (default), algolia
algolia:
  application_id: # YOUR_APPLICATION_ID
  index_name: # YOUR_INDEX_NAME
  search_only_api_key: # YOUR_SEARCH_ONLY_API_KEY
  powered_by: # true (default), false

# Build settings
markdown: kramdown
# WordPress-imported posts have one <p> per line separated by single newlines,
# so the Jekyll default \n\n separator never matches and excerpt = full post.
excerpt_separator: "\n"
sass:
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions
    - slash-div
    - mixed-decls
#theme: jekyll-theme-basically-basic
remote_theme: "mmistakes/jekyll-theme-basically-basic@1.4.5"
plugins: # previously gems
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2
  - jekyll-remote-theme
feed:
  path: atom.xml

# Pagination - jekyll-paginate-v2 (https://github.com/sverrirs/jekyll-paginate-v2)
pagination:
  enabled: true
  per_page: 10
  permalink: '/page:num/'
  sort_field: 'date'
  sort_reverse: true

# Exclude from processing.
exclude:
  - .asset-cache
  - .bundle
  - .codeclimate.yml
  - .editorconfig
  - .gitattributes
  - .jekyll-assets-cache
  - .sass-cache
  - .scss-lint.yml
  - CHANGELOG
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - node_modules
  - Rakefile
  - README
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - /docs # ignore Basically Basic sample site
  - /example # ignore Basically Basic dev site

# Front Matter Defaults
defaults:
  # _posts
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      read_time: true
      permalink: /:year/:month/:day/:title/

